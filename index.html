<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTOHUAS CMS - 콘텐츠 관리 시스템</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',sans-serif; background:#0a0a0f; color:#e0e0e0; min-height:100vh; }

/* ── Sidebar ── */
.sidebar { position:fixed; left:0; top:0; width:220px; height:100vh; background:#111118; border-right:1px solid #1e1e2e; display:flex; flex-direction:column; z-index:100; }
.logo { padding:24px 20px; border-bottom:1px solid #1e1e2e; }
.logo h1 { font-size:20px; font-weight:900; color:#fff; letter-spacing:2px; }
.logo span { font-size:11px; color:#666; display:block; margin-top:4px; }
.nav { flex:1; padding:16px 0; }
.nav-item { display:flex; align-items:center; gap:10px; padding:12px 20px; cursor:pointer; transition:all .2s; color:#888; font-size:14px; border-left:3px solid transparent; }
.nav-item:hover { background:#1a1a25; color:#ccc; }
.nav-item.active { background:#1a1a25; color:#ff4444; border-left-color:#ff4444; }
.nav-item .icon { font-size:18px; width:24px; text-align:center; }

/* ── Main ── */
.main { margin-left:220px; padding:30px; min-height:100vh; }
.page { display:none; }
.page.active { display:block; }
.page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
.page-header h2 { font-size:24px; font-weight:700; color:#fff; }

/* ── Buttons ── */
.btn { padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; transition:all .2s; }
.btn-primary { background:#ff4444; color:#fff; }
.btn-primary:hover { background:#ff6666; }
.btn-secondary { background:#1e1e2e; color:#ccc; border:1px solid #2a2a3a; }
.btn-secondary:hover { background:#2a2a3a; }
.btn-sm { padding:6px 12px; font-size:12px; }
.btn-danger { background:#441111; color:#ff6666; }
.btn-danger:hover { background:#551111; }

/* ── Cards ── */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:16px; margin-bottom:30px; }
.stat-card { background:#14141e; border:1px solid #1e1e2e; border-radius:12px; padding:20px; }
.stat-card .label { font-size:12px; color:#666; margin-bottom:8px; }
.stat-card .value { font-size:28px; font-weight:700; color:#fff; }
.stat-card .sub { font-size:12px; color:#ff4444; margin-top:4px; }

/* ── Table ── */
.data-table { width:100%; border-collapse:collapse; }
.data-table th { text-align:left; padding:12px 16px; font-size:12px; color:#666; border-bottom:1px solid #1e1e2e; font-weight:500; }
.data-table td { padding:12px 16px; font-size:13px; border-bottom:1px solid #1a1a25; }
.data-table tr:hover td { background:#14141e; }

/* ── Tags ── */
.tag { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; }
.tag-reels { background:#2a1a3a; color:#b366ff; }
.tag-carousel { background:#1a2a3a; color:#66b3ff; }
.tag-news { background:#2a2a1a; color:#ffcc44; }
.tag-newcar { background:#1a3a2a; color:#44cc88; }
.tag-review { background:#3a1a1a; color:#ff6666; }
.tag-tuning { background:#3a2a1a; color:#ff9944; }
.tag-cool { background:#1a2a3a; color:#44bbff; }
.tag-etc { background:#2a2a2a; color:#aaa; }

/* ── Status ── */
.status { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; }
.status-idea { background:#2a2a1a; color:#ffcc44; }
.status-planning { background:#1a2a3a; color:#66b3ff; }
.status-making { background:#2a1a3a; color:#b366ff; }
.status-done { background:#1a3a2a; color:#44cc88; }
.status-uploaded { background:#1a3a1a; color:#44ff88; }

/* ── Modal ── */
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.7); z-index:200; justify-content:center; align-items:center; }
.modal-overlay.active { display:flex; }
.modal { background:#14141e; border:1px solid #2a2a3a; border-radius:16px; padding:30px; width:90%; max-width:520px; max-height:85vh; overflow-y:auto; }
.modal h3 { font-size:18px; color:#fff; margin-bottom:20px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:12px; color:#888; margin-bottom:6px; }
.form-group input, .form-group select, .form-group textarea {
  width:100%; padding:10px 14px; background:#0a0a0f; border:1px solid #2a2a3a;
  border-radius:8px; color:#e0e0e0; font-family:inherit; font-size:13px; outline:none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:#ff4444; }
.form-group textarea { resize:vertical; min-height:80px; }
.form-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }

/* ── Filter Bar ── */
.filter-bar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
.filter-bar select, .filter-bar input { padding:8px 12px; background:#14141e; border:1px solid #2a2a3a; border-radius:8px; color:#e0e0e0; font-family:inherit; font-size:13px; outline:none; }
.filter-bar input { flex:1; min-width:200px; }

/* ── Calendar ── */
.calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-header { text-align:center; padding:10px; font-size:12px; color:#666; font-weight:500; }
.cal-day { background:#14141e; border:1px solid #1a1a25; border-radius:6px; min-height:100px; padding:6px; }
.cal-day.today { border-color:#ff4444; }
.cal-day.other-month { opacity:.3; }
.cal-day .day-num { font-size:12px; color:#888; margin-bottom:4px; }
.cal-day .cal-item { font-size:10px; padding:2px 6px; border-radius:4px; margin-bottom:2px; cursor:pointer; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.cal-item.type-릴스 { background:#2a1a3a; color:#b366ff; }
.cal-item.type-캐러셀 { background:#1a2a3a; color:#66b3ff; }
.cal-nav { display:flex; align-items:center; gap:16px; margin-bottom:16px; }
.cal-nav h3 { font-size:18px; color:#fff; min-width:160px; text-align:center; }
.cal-nav button { background:#1e1e2e; border:1px solid #2a2a3a; color:#ccc; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:14px; }

/* ── Archive Card ── */
.archive-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:16px; }
.archive-card { background:#14141e; border:1px solid #1e1e2e; border-radius:12px; padding:18px; transition:all .2s; }
.archive-card:hover { border-color:#2a2a3a; }
.archive-card .card-title { font-size:14px; font-weight:500; color:#fff; margin-bottom:8px; }
.archive-card .card-url { font-size:12px; color:#ff4444; word-break:break-all; text-decoration:none; display:block; margin-bottom:10px; }
.archive-card .card-url:hover { text-decoration:underline; }
.archive-card .card-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.archive-card .card-date { font-size:11px; color:#666; }
.archive-card .card-memo { font-size:12px; color:#888; margin-top:8px; line-height:1.5; }
.card-actions { display:flex; gap:6px; margin-top:12px; }

/* ── Empty State ── */
.empty-state { text-align:center; padding:60px 20px; color:#444; }
.empty-state .icon { font-size:48px; margin-bottom:16px; }
.empty-state p { font-size:14px; }

/* ── Responsive ── */
@media (max-width:768px) {
  .sidebar { width:60px; }
  .sidebar .logo h1, .sidebar .logo span, .sidebar .nav-item span { display:none; }
  .sidebar .nav-item { justify-content:center; padding:14px; }
  .main { margin-left:60px; padding:16px; }
  .cal-day { min-height:60px; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">
    <h1>AUTOHUAS</h1>
    <span>Content Management</span>
  </div>
  <div class="nav">
    <div class="nav-item active" data-page="dashboard"><span class="icon">📊</span><span>대시보드</span></div>
    <div class="nav-item" data-page="ideas"><span class="icon">💡</span><span>아이디어</span></div>
    <div class="nav-item" data-page="archive"><span class="icon">🔗</span><span>아카이빙</span></div>
    <div class="nav-item" data-page="calendar"><span class="icon">📅</span><span>캘린더</span></div>

</div>

<!-- Main Content -->
<div class="main">

  <!-- ===== Dashboard ===== -->
  <div class="page active" id="page-dashboard">
    <div class="page-header"><h2>대시보드</h2></div>

    <table class="data-table">

      <tbody id="dashboard-recent"></tbody>
    </table>
  </div>

  <!-- ===== Ideas ===== -->
  <div class="page" id="page-ideas">
    <div class="page-header">
      <h2>콘텐츠 아이디어</h2>
      <button class="btn btn-primary" onclick="openModal('idea')">+ 아이디어 추가</button>
    </div>
    <div class="filter-bar">
      <select id="filter-type" onchange="renderIdeas()">
        <option value="">전체 유형</option>
        <option value="릴스">릴스</option>
        <option value="캐러셀">캐러셀</option>
      </select>
      <select id="filter-category" onchange="renderIdeas()">
        <option value="">전체 카테고리</option>
        <option value="자동차 뉴스">자동차 뉴스</option>
        <option value="신차 소식">신차 소식</option>
        <option value="신기한 영상">신기한 영상</option>
        <option value="간지 자동차">간지 자동차</option>
        <option value="자동차 리뷰">자동차 리뷰</option>
        <option value="튜닝">튜닝</option>
        <option value="기타">기타</option>
      </select>
      <select id="filter-status" onchange="renderIdeas()">
        <option value="">전체 상태</option>
        <option value="아이디어">아이디어</option>
        <option value="기획중">기획중</option>
        <option value="제작중">제작중</option>
        <option value="완료">완료</option>
        <option value="업로드완료">업로드완료</option>
      </select>
      <input type="text" id="filter-search" placeholder="검색..." oninput="renderIdeas()">
    </div>
    <table class="data-table">
      <thead><tr><th>제목</th><th>유형</th><th>카테고리</th><th>상태</th><th>담당자</th><th>예정일</th><th>관리</th></tr></thead>
      <tbody id="ideas-table"></tbody>
    </table>
    <div id="ideas-empty" class="empty-state" style="display:none;">
      <div class="icon">💡</div>
      <p>아직 등록된 아이디어가 없습니다.<br>위의 버튼으로 첫 아이디어를 추가해보세요!</p>
    </div>
  </div>

  <!-- ===== Archive ===== -->
  <div class="page" id="page-archive">
    <div class="page-header">
      <h2>URL / 레퍼런스 아카이빙</h2>
      <button class="btn btn-primary" onclick="openModal('archive')">+ 레퍼런스 추가</button>
    </div>
    <div class="filter-bar">
      <select id="archive-filter-cat" onchange="renderArchive()">
        <option value="">전체 카테고리</option>
        <option value="자동차 뉴스">자동차 뉴스</option>
        <option value="신차 소식">신차 소식</option>
        <option value="신기한 영상">신기한 영상</option>
        <option value="간지 자동차">간지 자동차</option>
        <option value="자동차 리뷰">자동차 리뷰</option>
        <option value="튜닝">튜닝</option>
        <option value="기타">기타</option>
      </select>
      <input type="text" id="archive-search" placeholder="제목 또는 URL 검색..." oninput="renderArchive()">
    </div>
    <div class="archive-grid" id="archive-grid"></div>
    <div id="archive-empty" class="empty-state" style="display:none;">
      <div class="icon">🔗</div>
      <p>아직 저장된 레퍼런스가 없습니다.<br>기사, 영상, 참고 URL을 아카이빙해보세요!</p>
    </div>
  </div>

  <!-- ===== Calendar ===== -->
  <div class="page" id="page-calendar">
    <div class="page-header">
      <h2>콘텐츠 캘린더</h2>
      <button class="btn btn-primary" onclick="openModal('idea')">+ 일정 추가</button>
    </div>
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">&lt;</button>
      <h3 id="cal-title"></h3>
      <button onclick="changeMonth(1)">&gt;</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>

</div>

<!-- ===== Idea Modal ===== -->
<div class="modal-overlay" id="modal-idea">
  <div class="modal">
    <h3 id="idea-modal-title">아이디어 추가</h3>
    <input type="hidden" id="idea-edit-id">
    <div class="form-group">
      <label>제목 *</label>
      <input type="text" id="idea-title" placeholder="예: V8 포드 머스탱 부활 소식">
    </div>
    <div class="form-group">
      <label>콘텐츠 유형 *</label>
      <select id="idea-type">
        <option value="릴스">릴스</option>
        <option value="캐러셀">캐러셀</option>
      </select>
    </div>
    <div class="form-group">
      <label>카테고리 *</label>
      <select id="idea-category">
        <option value="자동차 뉴스">자동차 뉴스</option>
        <option value="신차 소식">신차 소식</option>
        <option value="신기한 영상">신기한 영상</option>
        <option value="간지 자동차">간지 자동차</option>
        <option value="자동차 리뷰">자동차 리뷰</option>
        <option value="튜닝">튜닝</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="form-group">
      <label>상태</label>
      <select id="idea-status">
        <option value="아이디어">아이디어</option>
        <option value="기획중">기획중</option>
        <option value="제작중">제작중</option>
        <option value="완료">완료</option>
        <option value="업로드완료">업로드완료</option>
      </select>
    </div>
    <div class="form-group">
      <label>담당자</label>
      <input type="text" id="idea-assignee" placeholder="이름">
    </div>
    <div class="form-group">
      <label>업로드 예정일</label>
      <input type="date" id="idea-date">
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea id="idea-memo" placeholder="참고사항, 방향성, 후킹 포인트 등"></textarea>
    </div>
    <div class="form-group">
      <label>참고 URL</label>
      <input type="text" id="idea-ref" placeholder="https://...">
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('idea')">취소</button>
      <button class="btn btn-primary" onclick="saveIdea()">저장</button>
    </div>
  </div>
</div>

<!-- ===== Archive Modal ===== -->
<div class="modal-overlay" id="modal-archive">
  <div class="modal">
    <h3 id="archive-modal-title">레퍼런스 추가</h3>
    <input type="hidden" id="archive-edit-id">
    <div class="form-group">
      <label>제목 *</label>
      <input type="text" id="archive-title" placeholder="예: 테슬라 모델Y 가격 인상 기사">
    </div>
    <div class="form-group">
      <label>URL *</label>
      <input type="text" id="archive-url" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>카테고리</label>
      <select id="archive-category">
        <option value="자동차 뉴스">자동차 뉴스</option>
        <option value="신차 소식">신차 소식</option>
        <option value="신기한 영상">신기한 영상</option>
        <option value="간지 자동차">간지 자동차</option>
        <option value="자동차 리뷰">자동차 리뷰</option>
        <option value="튜닝">튜닝</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea id="archive-memo" placeholder="왜 저장했는지, 어떻게 활용할지"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('archive')">취소</button>
      <button class="btn btn-primary" onclick="saveArchive()">저장</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// ══════════════════════════════════════
//  Firebase Setup
// ══════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCktesG73iCLG_ZCZuGgm2_w6ev6A4UAmU",
  authDomain: "autohaus-ce01a.firebaseapp.com",
  databaseURL: "https://autohaus-ce01a-default-rtdb.firebaseio.com",
  projectId: "autohaus-ce01a",
  storageBucket: "autohaus-ce01a.firebasestorage.app",
  messagingSenderId: "715854127773",
  appId: "1:715854127773:web:19a374f73f2686f5e06a74"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ══════════════════════════════════════
//  Data Layer (Firebase Realtime DB)
// ══════════════════════════════════════
// Local cache for fast reads
let _cache = { ideas: [], archives: [] };

function getData(key) { return _cache[key] || []; }

function setData(key, val) {
  _cache[key] = val;
  db.ref(key).set(val);
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

// Listen for real-time changes from Firebase
function initFirebaseListeners() {
  ['ideas', 'archives'].forEach(key => {
    db.ref(key).on('value', snapshot => {
      _cache[key] = snapshot.val() || [];
      // Re-render current page
      renderDashboard();
      renderIdeas();
      renderArchive();
      renderCalendar();
    });
  });
}

// ══════════════════════════════════════
//  Navigation
// ══════════════════════════════════════
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    item.classList.add('active');
    document.getElementById('page-' + item.dataset.page).classList.add('active');
    if (item.dataset.page === 'dashboard') renderDashboard();
    if (item.dataset.page === 'ideas') renderIdeas();
    if (item.dataset.page === 'archive') renderArchive();
    if (item.dataset.page === 'calendar') renderCalendar();
  });
});

// ══════════════════════════════════════
//  Modal
// ══════════════════════════════════════
function openModal(type) {
  document.getElementById('modal-' + type).classList.add('active');
  if (type === 'idea') {
    document.getElementById('idea-modal-title').textContent = '아이디어 추가';
    document.getElementById('idea-edit-id').value = '';
  }
  if (type === 'archive') {
    document.getElementById('archive-modal-title').textContent = '레퍼런스 추가';
    document.getElementById('archive-edit-id').value = '';
  }
}
function closeModal(type) {
  document.getElementById('modal-' + type).classList.remove('active');
  // Clear form
  if (type === 'idea') {
    ['idea-title','idea-assignee','idea-date','idea-memo','idea-ref'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('idea-type').value = '릴스';
    document.getElementById('idea-category').value = '자동차 뉴스';
    document.getElementById('idea-status').value = '아이디어';
  }
  if (type === 'archive') {
    ['archive-title','archive-url','archive-memo'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('archive-category').value = '자동차 뉴스';
  }
}

// ══════════════════════════════════════
//  Tag/Status Helpers
// ══════════════════════════════════════
const typeClass = { '릴스':'tag-reels', '캐러셀':'tag-carousel' };
const catClass = { '자동차 뉴스':'tag-news', '신차 소식':'tag-newcar', '자동차 리뷰':'tag-review', '튜닝':'tag-tuning', '신기한 영상':'tag-cool', '간지 자동차':'tag-cool', '기타':'tag-etc' };
const statusClass = { '아이디어':'status-idea', '기획중':'status-planning', '제작중':'status-making', '완료':'status-done', '업로드완료':'status-uploaded' };

function tagHTML(text, cls) { return `<span class="tag ${cls}">${text}</span>`; }
function statusHTML(text) { return `<span class="status ${statusClass[text]||''}">${text}</span>`; }

// ══════════════════════════════════════
//  Ideas CRUD
// ══════════════════════════════════════
function saveIdea() {
  const title = document.getElementById('idea-title').value.trim();
  if (!title) { alert('제목을 입력해주세요!'); return; }

  const ideas = getData('ideas');
  const editId = document.getElementById('idea-edit-id').value;

  const item = {
    id: editId || genId(),
    title,
    type: document.getElementById('idea-type').value,
    category: document.getElementById('idea-category').value,
    status: document.getElementById('idea-status').value,
    assignee: document.getElementById('idea-assignee').value.trim(),
    date: document.getElementById('idea-date').value,
    memo: document.getElementById('idea-memo').value.trim(),
    ref: document.getElementById('idea-ref').value.trim(),
    createdAt: editId ? (ideas.find(i => i.id === editId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };

  if (editId) {
    const idx = ideas.findIndex(i => i.id === editId);
    if (idx >= 0) ideas[idx] = item;
  } else {
    ideas.unshift(item);
  }

  setData('ideas', ideas);
  closeModal('idea');
  renderIdeas();
}

function editIdea(id) {
  const ideas = getData('ideas');
  const item = ideas.find(i => i.id === id);
  if (!item) return;

  document.getElementById('idea-modal-title').textContent = '아이디어 수정';
  document.getElementById('idea-edit-id').value = id;
  document.getElementById('idea-title').value = item.title;
  document.getElementById('idea-type').value = item.type;
  document.getElementById('idea-category').value = item.category;
  document.getElementById('idea-status').value = item.status;
  document.getElementById('idea-assignee').value = item.assignee || '';
  document.getElementById('idea-date').value = item.date || '';
  document.getElementById('idea-memo').value = item.memo || '';
  document.getElementById('idea-ref').value = item.ref || '';
  document.getElementById('modal-idea').classList.add('active');
}

function deleteIdea(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  const ideas = getData('ideas').filter(i => i.id !== id);
  setData('ideas', ideas);
  renderIdeas();
}

function renderIdeas() {
  if (!document.getElementById('filter-type')) return;
  let ideas = getData('ideas');
  const fType = document.getElementById('filter-type').value;
  const fCat = document.getElementById('filter-category').value;
  const fStatus = document.getElementById('filter-status').value;
  const fSearch = document.getElementById('filter-search').value.toLowerCase();

  if (fType) ideas = ideas.filter(i => i.type === fType);
  if (fCat) ideas = ideas.filter(i => i.category === fCat);
  if (fStatus) ideas = ideas.filter(i => i.status === fStatus);
  if (fSearch) ideas = ideas.filter(i => i.title.toLowerCase().includes(fSearch) || (i.memo||'').toLowerCase().includes(fSearch));

  const tbody = document.getElementById('ideas-table');
  const empty = document.getElementById('ideas-empty');

  if (ideas.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = ideas.map(i => `
    <tr>
      <td style="color:#fff;font-weight:500;">${i.title}</td>
      <td>${tagHTML(i.type, typeClass[i.type]||'')}</td>
      <td>${tagHTML(i.category, catClass[i.category]||'tag-etc')}</td>
      <td>${statusHTML(i.status)}</td>
      <td>${i.assignee || '-'}</td>
      <td>${i.date || '-'}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="editIdea('${i.id}')">수정</button>
        <button class="btn btn-danger btn-sm" onclick="deleteIdea('${i.id}')">삭제</button>
      </td>
    </tr>
  `).join('');
}

// ══════════════════════════════════════
//  Archive CRUD
// ══════════════════════════════════════
function saveArchive() {
  const title = document.getElementById('archive-title').value.trim();
  const url = document.getElementById('archive-url').value.trim();
  if (!title || !url) { alert('제목과 URL을 입력해주세요!'); return; }

  const archives = getData('archives');
  const editId = document.getElementById('archive-edit-id').value;

  const item = {
    id: editId || genId(),
    title,
    url,
    category: document.getElementById('archive-category').value,
    memo: document.getElementById('archive-memo').value.trim(),
    createdAt: editId ? (archives.find(a => a.id === editId)?.createdAt || new Date().toISOString()) : new Date().toISOString()
  };

  if (editId) {
    const idx = archives.findIndex(a => a.id === editId);
    if (idx >= 0) archives[idx] = item;
  } else {
    archives.unshift(item);
  }

  setData('archives', archives);
  closeModal('archive');
  renderArchive();
}

function editArchive(id) {
  const archives = getData('archives');
  const item = archives.find(a => a.id === id);
  if (!item) return;

  document.getElementById('archive-modal-title').textContent = '레퍼런스 수정';
  document.getElementById('archive-edit-id').value = id;
  document.getElementById('archive-title').value = item.title;
  document.getElementById('archive-url').value = item.url;
  document.getElementById('archive-category').value = item.category;
  document.getElementById('archive-memo').value = item.memo || '';
  document.getElementById('modal-archive').classList.add('active');
}

function deleteArchive(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  const archives = getData('archives').filter(a => a.id !== id);
  setData('archives', archives);
  renderArchive();
}

function renderArchive() {
  if (!document.getElementById('archive-filter-cat')) return;
  let archives = getData('archives');
  const fCat = document.getElementById('archive-filter-cat').value;
  const fSearch = document.getElementById('archive-search').value.toLowerCase();

  if (fCat) archives = archives.filter(a => a.category === fCat);
  if (fSearch) archives = archives.filter(a => a.title.toLowerCase().includes(fSearch) || a.url.toLowerCase().includes(fSearch));

  const grid = document.getElementById('archive-grid');
  const empty = document.getElementById('archive-empty');

  if (archives.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = archives.map(a => `
    <div class="archive-card">
      <div class="card-title">${a.title}</div>
      <a class="card-url" href="${a.url}" target="_blank">${a.url}</a>
      <div class="card-meta">
        ${tagHTML(a.category, catClass[a.category]||'tag-etc')}
        <span class="card-date">${new Date(a.createdAt).toLocaleDateString('ko-KR')}</span>
      </div>
      ${a.memo ? `<div class="card-memo">${a.memo}</div>` : ''}
      <div class="card-actions">
        <button class="btn btn-secondary btn-sm" onclick="editArchive('${a.id}')">수정</button>
        <button class="btn btn-danger btn-sm" onclick="deleteArchive('${a.id}')">삭제</button>
      </div>
    </div>
  `).join('');
}

// ══════════════════════════════════════
//  Calendar
// ══════════════════════════════════════
let calYear, calMonth;
(function initCal() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
})();

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  const title = document.getElementById('cal-title');
  title.textContent = `${calYear}년 ${calMonth + 1}월`;

  const grid = document.getElementById('calendar-grid');
  const days = ['일','월','화','수','목','금','토'];
  let html = days.map(d => `<div class="cal-header">${d}</div>`).join('');

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const lastDate = new Date(calYear, calMonth + 1, 0).getDate();
  const prevLastDate = new Date(calYear, calMonth, 0).getDate();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  const ideas = getData('ideas').filter(i => i.date);

  // Previous month days
  for (let i = firstDay - 1; i >= 0; i--) {
    html += `<div class="cal-day other-month"><div class="day-num">${prevLastDate - i}</div></div>`;
  }

  // Current month days
  for (let d = 1; d <= lastDate; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const dayIdeas = ideas.filter(i => i.date === dateStr);
    const itemsHTML = dayIdeas.map(i =>
      `<div class="cal-item type-${i.type}" title="${i.title}" onclick="editIdea('${i.id}')">${i.title}</div>`
    ).join('');
    html += `<div class="cal-day${isToday ? ' today' : ''}"><div class="day-num">${d}</div>${itemsHTML}</div>`;
  }

  // Next month days
  const totalCells = firstDay + lastDate;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;
  }

  grid.innerHTML = html;
}

// ══════════════════════════════════════
//  Dashboard
// ══════════════════════════════════════
function renderDashboard() {
  const ideas = getData('ideas');
  const archives = getData('archives');

  const total = ideas.length;
  const reels = ideas.filter(i => i.type === '릴스').length;
  const carousel = ideas.filter(i => i.type === '캐러셀').length;
  const inProgress = ideas.filter(i => ['기획중','제작중'].includes(i.status)).length;
  const done = ideas.filter(i => ['완료','업로드완료'].includes(i.status)).length;

  document.getElementById('dashboard-stats').innerHTML = `
    <div class="stat-card"><div class="label">전체 아이디어</div><div class="value">${total}</div><div class="sub">릴스 ${reels} / 캐러셀 ${carousel}</div></div>
    <div class="stat-card"><div class="label">진행중</div><div class="value">${inProgress}</div><div class="sub">기획 + 제작</div></div>
    <div class="stat-card"><div class="label">완료</div><div class="value">${done}</div><div class="sub">완료 + 업로드</div></div>
    <div class="stat-card"><div class="label">아카이빙</div><div class="value">${archives.length}</div><div class="sub">저장된 레퍼런스</div></div>
  `;

  const recent = ideas.slice(0, 5);
  document.getElementById('dashboard-recent').innerHTML = recent.length === 0
    ? '<tr><td colspan="5" style="text-align:center;color:#444;padding:40px;">아이디어를 추가해보세요!</td></tr>'
    : recent.map(i => `
      <tr>
        <td style="color:#fff;">${i.title}</td>
        <td>${tagHTML(i.type, typeClass[i.type]||'')}</td>
        <td>${tagHTML(i.category, catClass[i.category]||'tag-etc')}</td>
        <td>${statusHTML(i.status)}</td>
        <td>${new Date(i.createdAt).toLocaleDateString('ko-KR')}</td>
      </tr>
    `).join('');
}

initFirebaseListeners();

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      overlay.classList.remove('active');
    }
  });
});

// Export/Import
function exportData() {
  const data = { ideas: getData('ideas'), archives: getData('archives'), exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `autohuas-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.ideas) setData('ideas', data.ideas);
      if (data.archives) setData('archives', data.archives);
      alert('데이터를 복원했습니다! (Firebase에 동기화됨)');
    } catch { alert('잘못된 파일입니다.'); }
  };
  reader.readAsText(file);
}
